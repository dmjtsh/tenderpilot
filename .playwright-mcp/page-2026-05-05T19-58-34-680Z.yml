                    - paragraph [ref=e228]: "«в том числе требований к количеству Товара, комплектности, упаковке Товара, комплекту, качеству и безопасности Товара Поставщик обязуется без дополнительной оплаты со стороны Заказчика устранить выявленные нарушения (допоставить, доукомплектовать, заменить Товар) в срок не позднее 3 (трех) календарных дней со дня получения от Заказчика мотивированного отказа. Допоставка недопоставленного, доукомплектование или замена некачественного Товара оформляется в соответствии с п. 3.3. – 3.4. Контракта. В случае повторного выявления по результатам экспертизы, предусмотренной настоящим пунктом, нарушений условий настоящего Контракта Заказчик вправе отказаться от исполнения настоящего Контракта по основаниям, предусмотренным гражданским законодательством Российской Федерации. 3.12. Право собственности и риск случайной гибели или порчи Товара переходит от Поставщика к Заказчику с даты размещения в единой информационной системе документа о приемке, подписанного Заказчиком. 3.13. Поставщик обязан одновременно с передачей Товара передать Заказчику относящиеся к нему документы, предусмотренные законодательством Российской Федерации, производителем Товара и настоящим Контрактом. 3.14. Сдача и приемка Товара осуществляются уполномоченными представителями Сторон. 3.15. Во всех случаях, влекущих возврат Товара Поставщику, Заказчик обязан обеспечить сохранность этого Товара до момента фактического его возврата. Возврат (замена) Товара осуществляется силами и за счет средств Поставщика. Расходы, понесенные Заказчиком в связи с принятием Товара на ответственное хранение и (или) его возвратом (заменой), подлежат возмещению Поставщиком. IV. Взаимодействие Сторон 4.1. Поставщик обязуется: 4.1.1. поставить Товар в порядке, количестве, в срок и на условиях, предусмотренных Контрактом и спецификацией; 4.1.2. обеспечить соответствие поставляемого Товара требованиям качества, безопасности жизни и здоровья, а также иным требованиям безопасности (санитарным нормам и правилам, государственным стандартам), сертификации, лицензирования, установленным законодательством Российской Федерации и Контрактом; 4.1.3. обеспечить за свой счет устранение выявленных недостатков Товара или осуществить его соответствующую замену в порядке и на условиях, предусмотренных Контрактом; 4.1.4. в случае принятия Поставщиком предусмотренного пунктом 4.2.3 Контракта решения об одностороннем отказе от исполнения Контракта: 4.1.4.1. поставщик с использованием единой информационной системы формирует решение об одностороннем отказе от исполнения контракта, подписывает его усиленной электронной подписью лица, имеющего право действовать от имени Поставщика, и размещает такое решение в единой информационной системе. В случаях, предусмотренных частью 5 статьи 103 Федерального закона № 44-ФЗ, такое решение не размещается на официальном сайте; 4.1.4.2. решение об одностороннем отказе от исполнения контракта не позднее одного часа с момента его размещения в единой информационной системе в соответствии с пунктом 4.1.4.1. Контракта автоматически с использованием единой информационной системы направляется Заказчику. Датой поступления Заказчику решения об одностороннем отказе от исполнения контракта считается дата размещения в соответствии с настоящим пунктом такого решения в единой информационной системе в соответствии с часовой зоной, в которой расположен Заказчик; 4.1.5. поступление решения об одностороннем отказе от исполнения Контракта в соответствии с пунктом 4.1.4. Контракта считается надлежащим уведомлением Заказчика об одностороннем отказе от исполнения контракта. 4.1.6. решение Поставщика об одностороннем отказе от исполнения контракта вступает в силу и Контракт считается расторгнутым через 10 (десять) дней с даты надлежащего уведомления Поставщиком Заказчика об одностороннем отказе от исполнения Контракта. 4.1.7. предоставлять Заказчику по его требованию документы, относящиеся к предмету Контракта, а также своевременно предоставлять Заказчику д