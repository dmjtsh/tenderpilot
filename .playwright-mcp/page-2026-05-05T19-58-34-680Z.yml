                        - img [ref=e240]
                    - paragraph [ref=e242]: "«надлежащего уведомления Поставщиком Заказчика об одностороннем отказе от исполнения Контракта. 4.1.7. предоставлять Заказчику по его требованию документы, относящиеся к предмету Контракта, а также своевременно предоставлять Заказчику достоверную информацию о ходе исполнения своих обязательств, в том числе о сложностях, возникающих при исполнении Контракта. 4.1.8. оформлять и подписывать документы о приемке с использованием Единой информационной сети (далее - ЕИС) в соответствии с ч.13 ст.94 Федерального закона от 05.04.2013г. № 44-ФЗ «О контрактной системе в сфере закупок товаров, работ, услуг для обеспечения государственных и муниципальных нужд». 4.2. Поставщик вправе: 4.2.1. требовать от Заказчика произвести приемку Товара в порядке и в сроки, предусмотренные Контрактом; 4.2.2. требовать своевременной оплаты на условиях, установленных Контрактом, надлежащим образом поставленного и принятого Заказчиком Товара; 4.2.3. принять решение об одностороннем отказе от исполнения Контракта в соответствии с гражданским законодательством; 4.2.4. требовать возмещения убытков, уплаты неустоек (штрафов, пеней) в соответствии с разделом VI Контракта; 4.2.5. по согласованию с Заказчиком (путем заключения дополнительного соглашения) поставить Товар, качество, технические и функциональные характеристики которого являются улучшенными по сравнению с качеством и соответствующими техническими и функциональными характеристиками, указанными в Контракте (за исключением случаев, которые предусмотрены нормативными правовыми актами, принятыми в соответствии с частью 6 статьи 14 Федерального закона от 5 апреля 2013 г. № 44-ФЗ \"О контрактной системе в сфере закупок товаров, работ, услуг для обеспечения государственных и муниципальных нужд\". 4.3. Заказчик обязуется: 4.3.1. обеспечить своевременную приемку и оплату поставленного Товара надлежащего качества в порядке и сроки, предусмотренные Контрактом; 4.3.2. принять решение об одностороннем отказе от исполнения Контракта в случае, если в ходе исполнения Контракта установлено, что Поставщик и (или) поставляемый Товар перестали соответствовать установленным извещением об осуществлении закупки и (или) документацией о закупке требованиям к участникам закупки и (или) поставляемому товару или при определении поставщика поставщик представил недостоверную информацию о своем соответствии и (или) соответствии поставляемого Товара таким требованиям, что позволило ему стать победителем определения поставщика; 4.3.3. в случае принятия Заказчиком предусмотренного пунктом 4.3.2. Контракта решения об одностороннем отказе от исполнения Контракта Заказчик с использованием ЕИС формирует решение об одностороннем отказе от исполнения контракта, подписывает его усиленной электронной подписью лица, имеющего право действовать от имени Заказчика, и размещает такое решение в единой информационной системе. В случаях, предусмотренных частью 5 статьи 103 Федерального закона № 44-ФЗ, такое решение не размещается на официальном сайте; 4.3.4. решение об одностороннем отказе от исполнения контракта не позднее одного часа с момента его размещения в единой информационной системе в соответствии с пунктом 4.3.3. Контракта автоматически с использованием единой информационной системы направляется Поставщику. Датой поступления Поставщику решения об одностороннем отказе от исполнения контракта считается дата размещения в соответствии с настоящим пунктом такого решения в единой информационной системе в соответствии с часовой зоной, в которой расположен Поставщик; 4.3.5. поступление решения об одностороннем отказе от исполнения контракта в соответствии с пунктом 4.3.4 Контракта считается надлежащим уведомлением Поставщика об одностороннем отказе от исполнения контракта. 4.3.6. решение Заказчика об одностороннем отказе от исполнения Контракта вступает в силу и контракт считается расторгнутым через 10 (десять) дней с даты надлежащего уведомления заказчиком Поставщика об одностороннем отказе от исполнения контракта. 4.3.7. требовать уплаты неустоек (штрафов, пеней) в соответствии»"
