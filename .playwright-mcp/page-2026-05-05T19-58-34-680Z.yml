                    - paragraph [ref=e235]: "«считается надлежащим уведомлением Поставщика об одностороннем отказе от исполнения контракта. 4.3.6. решение Заказчика об одностороннем отказе от исполнения Контракта вступает в силу и контракт считается расторгнутым через 10 (десять) дней с даты надлежащего уведомления заказчиком Поставщика об одностороннем отказе от исполнения контракта. 4.3.7. требовать уплаты неустоек (штрафов, пеней) в соответствии с разделом VI Контракта; 4.3.8. провести экспертизу поставленного Товара для проверки его соответствия условиям Контракта в соответствии с Федеральным законом от 5 апреля 2013 г. № 44-ФЗ \"О контрактной системе в сфере закупок товаров, работ, услуг для обеспечения государственных и муниципальных нужд\". 4.4. Заказчик вправе: 4.4.1. требовать от Поставщика надлежащего исполнения обязательств по Контракту; 4.4.2. требовать от Поставщика своевременного устранения недостатков, выявленных как в ходе приемки, так и в течение гарантийного периода; 4.4.3. проверять ход и качество выполнения Поставщиком условий Контракта без вмешательства в оперативно-хозяйственную деятельность Поставщика; 4.4.4. требовать возмещения убытков в соответствии с разделом VI Контракта, причиненных по вине Поставщика; 4.4.5. предложить увеличить или уменьшить в процессе исполнения Контракта количество Товара, предусмотренного Контрактом, не более чем на 10 (десять) процентов в порядке и на условиях, установленных Федеральным законом от 5 апреля 2013 г. № 44-ФЗ \"О контрактной системе в сфере закупок товаров, работ, услуг для обеспечения государственных и муниципальных нужд\"; 4.4.6. отказаться от приемки и оплаты Товара, не соответствующего условиям Контракта; 4.4.7. принять решение об одностороннем отказе от исполнения Контракта в соответствии с гражданским законодательством; 4.4.8. до принятия решения об одностороннем отказе от исполнения Контракта провести экспертизу поставленного Товара с привлечением экспертов, экспертных организаций. 4.4.9. создать приемочную комиссию, состоящую не менее чем из пяти человек, для приемки поставленного товара. 4.4.10. удержать суммы неисполненных поставщиком требований об уплате неустоек (штрафов, пеней), предъявленных Заказчиком в соответствии с условиями Контракта и Закона № 44-ФЗ, из суммы, подлежащей оплате Поставщику. V. Качество Товара. 5.1. Поставщик гарантирует, что поставляемый Товар соответствует требованиям, установленным Контрактом. Поставляемый товар должен быть новым (товаром, который не был в употреблении, в том числе, который не был восстановлен, у которого не была осуществлена замена составных частей, не были восстановлены потребительские свойства), неиспользованным, серийным, отражающим все последние модификации, иметь упаковку и маркировку в соответствии с действующими требованиями. 5.2. Поставщик гарантирует безопасность Товара в соответствии с требованиями, установленными к данному виду товара правом Евразийского экономического союза и законодательством Российской Федерации. Поставляемый Товар должен соответствовать действующим в Российской Федерации стандартам, техническим регламентам, санитарным и фитосанитарным нормам. Качество товара должно удостоверяться сертификатами качества (соответствия), в случае если их наличие предусмотрено изготовителем, оригиналы и (или) копии которых передаются заказчику одновременно с товаром без дополнительной оплаты. Техническое описание и инструкции по эксплуатации на русском языке. 5.3. Товар должен быть упакован и замаркирован в соответствии с действующими стандартами. Поставщик поставляет Товар в упаковке завода-изготовителя, позволяющей транспортировать его любым видом транспорта на любое расстояние, предохранять от повреждений, загрязнений, утраты товарного вида и порчи при его перевозке с учетом возможных перегрузок в пути и длительного хранения. 5.4. Требования к гарантийному сроку Товара и (или) объему предоставления гарантий его качества, к гарантийному обслуживанию Товара, к расходам на обслуживание составляет 12 месяцев и исчисляется с даты подписания Заказчиком документа о приемке»"
