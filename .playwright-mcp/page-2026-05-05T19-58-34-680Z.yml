авщику (юридическому лицу или физическому лицу, в том числе зарегистрированному в качестве индивидуального предпринимателя), на размер налогов, сборов и иных обязательных платежей в бюджеты бюджетной системы Российской Федерации, связанных с оплатой настоящего Контракта, если в соответствии с законодательством Российской Федерации о налогах и сборах такие налоги, сборы и иные обязательные платежи подлежат уплате в бюджеты бюджетной системы Российской Федерации Заказчиком. 2.3. Цена Контракта включает в себя: стоимость Товара, расходы, связанные с доставкой, разгрузкой - погрузкой, подъем на этаж, размещением товара в местах хранения Заказчика, стоимость упаковки (тары), маркировки, страхование, таможенные платежи (пошлины), НДС, другие установленные налоги, сборы и иные расходы, связанные с исполнением Контракта. 2.4. Цена Контракта является твердой и определяется на весь срок исполнения Контракта, за исключением случаев, установленных Федеральным законом от 5 апреля 2013 г. № 44-ФЗ \"О контрактной системе в сфере закупок товаров, работ, услуг для обеспечения государственных и муниципальных нужд\" и Контрактом. Цена Контракта может быть снижена по соглашению Сторон без изменения, предусмотренного Контрактом количества и качества поставляемого Товара и иных условий Контракта. 2.5. Источник финансирования Контракта – Средства бюджетных учреждений. 2.6. Валютой платежа является российский рубль. 2.7. Оплата по Контракту осуществляется в течение 7 (семи) рабочих дней со дня подписания Заказчиком документов о приемке товара в порядке, установленном разделом III Контракта. 2.8. Оплата по Контракту осуществляется по безналичному расчету платежными поручениями путем перечисления Заказчиком денежных средств на расчетный счет Поставщика, указанный в Контракте. В случае изменения расчетного счета Поставщик обязан в трехдневный срок с момента изменения расчетного счета в письменной форме сообщить об этом Заказчику, указав новые реквизиты расчетного счета. В противном случае все риски, связанные»"
