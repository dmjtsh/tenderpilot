global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: django
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: celery
    static_configs:
      - targets: ["celery_exporter:9808"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: node
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
